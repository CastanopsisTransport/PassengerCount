<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- App-like behaviour for IOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Optional but nice -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#000000">

  <title>Bus Counter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<h2>Bus Passenger Counter</h2>

<h3>Survey Information</h3>
<div id="surveyInfo" style="background-color: #ecf0f1; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
  <div style="margin-bottom: 12px;">
    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Surveyor Name</label>
    <input id="surveyerName" type="text" placeholder="Enter surveyor name" style="width: 100%; max-width: 400px; padding: 8px; border: 1px solid #bdc3c7; border-radius: 4px;">
  </div>
  
  <div style="margin-bottom: 12px;">
    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Date</label>
    <div style="display: flex; gap: 15px; align-items: center;">
      <input id="surveyDate" type="date" style="padding: 8px; border: 1px solid #bdc3c7; border-radius: 4px;">
      <span id="dayOfWeek" style="font-size: 1rem;"></span>
    </div>
  </div>
  
  <div style="margin-bottom: 12px;">
    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Vehicle Number</label>
    <input id="vehicleNumber" type="text" placeholder="Enter vehicle number" style="width: 100%; max-width: 400px; padding: 8px; border: 1px solid #bdc3c7; border-radius: 4px;">
  </div>
  
  <div style="margin-bottom: 12px;">
    <label style="display: block; font-weight: 600; margin-bottom: 5px;">General Notes</label>
    <textarea id="surveyNotes" placeholder="Enter any general notes about the survey" style="width: 100%; height: 70px; border: 1px solid #bdc3c7; border-radius: 4px; padding: 8px;"></textarea>
  </div>
  
  <div id="selectedRouteInfo" style="padding-top: 10px; border-top: 1px solid #bdc3c7; margin-top: 10px; font-weight: 600; color: #2c3e50;"></div>
</div>

<h3>Select Route</h3>

<input id="routeInput" placeholder="Enter route (e.g. 11)">
<button onclick="searchRoute()">Search</button>

<ul id="routeList"></ul>

<h3>Passenger Data</h3>

<table border="1">
  <thead>
    <tr>
      <th>Stop</th>
      <th>Time</th>
      <th>Boarding</th>
      <th>Alighting</th>
      <th>Onboard <br><small style="font-weight: normal;">(Auto-fill from one entry)</small></th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<br>
<button onclick="exportCSV()" class="export-btn">Export to CSV</button>

<script src="script.js"></script>

</body>
</html>
