<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- App-like behaviour -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Optional but nice -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#000000">

  <title>Bus Counter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<h2>Bus Passenger Counter</h2>

<h3>Survey Information</h3>
<div id="surveyInfo" style="background-color: #ecf0f1; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
  <input id="surveyerName" type="text" placeholder="Surveyor Name" style="width: 200px; margin-right: 10px;">
  <input id="surveyDate" type="date" style="width: 150px; margin-right: 10px;">
  <span id="dayOfWeek" style="margin-right: 10px;"></span>
  <input id="vehicleNumber" type="text" placeholder="Vehicle Number" style="width: 150px; margin-right: 10px;">
  <br><br>
  <textarea id="surveyNotes" placeholder="General Notes" style="width: 100%; height: 60px; border: 1px solid #bdc3c7; border-radius: 4px; padding: 8px;"></textarea>
</div>

<h3>Select Route</h3>

<input id="routeInput" placeholder="Enter route (e.g. 11)">
<button onclick="searchRoute()">Search</button>

<ul id="routeList"></ul>

<h3>Passenger Data</h3>

<table border="1">
  <thead>
    <tr>
      <th>Stop</th>
      <th>Time</th>
      <th>Boarding</th>
      <th>Alighting</th>
      <th>Onboard <br><small style="font-weight: normal;">(Auto-fill from one entry)</small></th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<br>
<button onclick="exportCSV()" class="export-btn">Export to CSV</button>

<script src="script.js"></script>

</body>
</html>
